on:
  push:
    branches:
      - feature/test
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - feature/test

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_ISLAND_0F6993C03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./frontend"     # Path to your frontend source code
          output_location: "."      # Build output (e.g., `dist/` or `build/`)
          skip_app_build: true         # Skip build if already done in previous step